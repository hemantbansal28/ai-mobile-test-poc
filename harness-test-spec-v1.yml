# AWS Device Farm custom test environment spec for Appium Node.js.
#
# Device Farm boots a Linux host, unpacks our test bundle to
# $DEVICEFARM_TEST_PACKAGE_PATH, installs the uploaded APK on the target device,
# starts an Appium server on 127.0.0.1:4723, and then runs the phases below.
#
# Reference: https://docs.aws.amazon.com/devicefarm/latest/developerguide/test-types-appium.html

version: 0.1

phases:
  install:
    commands:
      # Use Node 20 from the pre-installed nvm on the Device Farm host.
      - export NVM_DIR=$HOME/.nvm
      - . $NVM_DIR/nvm.sh
      - nvm install 20
      - nvm use 20
      - node -v
      - npm -v

      - cd $DEVICEFARM_TEST_PACKAGE_PATH
      # Test bundle is uploaded WITHOUT node_modules; install them on the host.
      - npm install --no-audit --no-fund --prefer-offline

  pre_test:
    commands:
      - echo "App under test : $DEVICEFARM_APP_PATH"
      - echo "Device platform: $DEVICEFARM_DEVICE_PLATFORM_NAME"
      - echo "Device name    : $DEVICEFARM_DEVICE_NAME"
      - echo "Device UDID    : $DEVICEFARM_DEVICE_UDID"
      - echo "OS version     : $DEVICEFARM_DEVICE_OS_VERSION"

  test:
    commands:
      - cd $DEVICEFARM_TEST_PACKAGE_PATH
      - npx wdio run ./wdio.devicefarm.conf.js

  post_test:
    commands: []

# Collect anything in the standard Device Farm log dir as a downloadable artifact.
artifacts:
  - $DEVICEFARM_LOG_DIR
